<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHub</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f5f5;
        }

        nav{
            background:#1f2937;
            color:white;
            padding:18px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
        }

        .hero{
            text-align:center;
            padding:90px 20px;
        }

        .hero h1{
            font-size:48px;
            color:#222;
        }

        .hero p{
            font-size:20px;
            color:#666;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:8px;
            cursor:pointer;
            font-size:18px;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<nav>

    <h2>📚 BookHub</h2>

    <div>

        <a href="/">Home</a>
        <a href="/books">Books</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>

    </div>

</nav>

<div class="hero">

    <h1>Welcome to BookHub</h1>

    <p>
        Engineering Books at one place.
    </p>

    <button>Explore Books</button>

</div>

</body>
</html>
